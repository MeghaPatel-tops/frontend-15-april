    <script>
        let myPrmise = new Promise((resolve,reject)=>{
             let userrole = prompt("Enter role");
             if(userrole != "admin"){
                  reject("Invalid userhghjjhg")
             }
             else{
                resolve("Login success");
             }
        })

        myPrmise
        .then((msg)=>console.log(msg))
        .catch((err)=>console.log(err))
        
    </script>
