<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="card shadow">
            
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">User Details</h3>
            </div>

            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-striped table-hover align-middle text-center">
                        
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Contact</th>
                                <th>Action</th>
                            </tr>
                        </thead>

                        <tbody id="userData">
                           
                        </tbody>

                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        function getUserData(){
            let userData = localStorage.getItem('f-user');
            if(userData){
                userData = JSON.parse(userData);
                printTable(userData)
            }
        }
        function printTable(data){
             if(data.length>=1){
                let str="";
                data.forEach((index,i)=>{
                    str+=`
                       <tr>
                                <td>${i+1}</td>
                                <td>${index.username}</td>
                                <td>${index.email}</td>
                                <td>${index.tel}</td>
                                <td>
                                    <a class="btn btn-warning btn-sm"  href="edit.html?uid=${i}">
                                        Edit
                                    </a>
                                    <button class="btn btn-danger btn-sm" onclick='delUser(${i})'>
                                        Delete
                                    </button>
                                </td>
                            </tr>
                    `
                })
                document.getElementById('userData').innerHTML=str;
             }

           
        }

          function delUser(id){
                    let userData = localStorage.getItem('f-user');
            if(userData){
                userData = JSON.parse(userData);
                 userData.splice(id,1);
                 console.log(userData);
                 localStorage.setItem('f-user',JSON.stringify(userData));
                 printTable(userData)
            }
             }
  

            
        window.onload= getUserData();
    </script>
    <!-- Bootstrap JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
