<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
      .box{
        height: 400px;
        width: 100%;
        margin: 20px 0px;
     
      }
      .box-0{
           background-color: aqua;
      }
      .box-1{
          background: linear-gradient(to bottom right,blue ,white);
      }
         .box-2{
          background: radial-gradient(blue 40% ,white);
      }
        .box-3{
          background: conic-gradient(blue 30%,rgb(55, 129, 159) 30% ,white);
      }
   </style>
</head>
<body>
    <div class="box box-0">

    </div>
    <div class="box box-1">

    </div>
    <div class="box box-2">

    </div>
    <div class="box box-3">

    </div>
</body>
</html>
