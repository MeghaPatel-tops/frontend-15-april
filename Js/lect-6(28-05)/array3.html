
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fruit CRUD</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body{
      background-color:#f5f5f5;
    }

    .main-box{
      max-width:800px;
      margin:auto;
      margin-top:50px;
      background:#fff;
      padding:30px;
      border-radius:10px;
      box-shadow:0px 0px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="main-box">

      <h2 class="text-center mb-4">Fruit CRUD App</h2>

      <!-- Form -->
      <div class="row">
        <div class="col-md-9">
          <input
            type="text"
            id="fruitName"
            class="form-control"
            placeholder="Enter Fruit Name"
          />
        </div>

        <div class="col-md-3">
          <button class="btn btn-primary w-100" onclick="addFruit()">
            Add Fruit
          </button>
        </div>
      </div>

      <!-- Table -->
      <div class="table-responsive mt-4">
        <table class="table table-bordered table-hover text-center">
          <thead class="table-dark">
            <tr>
              <th>#</th>
              <th>Fruit Name</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="fruitTableBody">
            

          </tbody>
        </table>
      </div>

    </div>
  </div>

  <script>
       let fruits = [];

       function addFruit(){
         let fname = document.getElementById('fruitName').value;
         fruits.push(fname);
         console.log(fruits);
         
         fruitShow();
         document.getElementById('fruitName').value="";
       }

       function fruitShow(){
           let str="";
           for(let i=0;i<fruits.length;i++){
               str+= `
               <tr>
                <td>${i+1}</td>
                <td>${fruits[i]}</td>
                <td> <button
                class="btn btn-danger btn-sm"
                onclick="delFruits(${i})" >
                Delete
              </button></td>
            </tr>`
           }
           document.getElementById('fruitTableBody').innerHTML=str;
       }
    
       function delFruits(id){
           //alert(id);
          fruits.splice(id,1);
           fruitShow();
       }

       window.onload = fruitShow();

  </script>

</body>
</html>
