<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>Table Print</legend>
        <input type="text" name="" id="num1">
        <input type="button" value="Submit" onclick="tablePrint()">
        <div id="result"></div>
    </fieldset>

    <script>
        function tablePrint(){
            let num = document.getElementById('num1').value;
            // let str="";
            // for(let i =1 ;i<=10;i++){
            //     str+= `${num} * ${i} = ${num*i}<br>`;
            // }
            // document.getElementById('result').innerHTML=str;

            let rem ;
            let rev=0;
            while(num != 0){
                rem = num %10;
                rev = rev*10+rem;
                num = parseInt(num/10);
            }
            document.getElementById('result').innerHTML=`rev num = ${rev}`;
        }
    </script>
</body>
</html>
