<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <div class="card shadow mt-4">
            <div class="card-header bg-dark text-white">
                <h3>Product List</h3>
            </div>
            
            <div class="card-body">
                <div class="p-5">
                    <button onclick="filtertByCat('all')">All</button>
                    <button onclick="filtertByCat('Mobile')">Mobile</button>
                    <button onclick="filtertByCat('Laptop')">Laptop</button>
                    <button onclick="filtertByCat('Headphone')">Headphone</button></div>
                <table class="table table-bordered table-striped table-hover">
                    <thead class="table-primary">
                        <tr>
                            <th>#</th>
                            <th>Product Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Description</th>
                           
                        </tr>
                    </thead>

                    <tbody id="tdata">
                       

                        
                    </tbody>

                </table>
            </div>
        </div>
    <script>
let products = [
  {
    pname: "iPhone 15",
    catname: "Mobile",
    price: 79999,
    descr: "Apple smartphone with A16 Bionic chip"
  },
  {
    pname: "Samsung Galaxy S24",
    catname: "Mobile",
    price: 74999,
    descr: "Flagship Android smartphone with AI features"
  },
  {
    pname: "Dell Inspiron 15",
    catname: "Laptop",
    price: 55999,
    descr: "15-inch laptop for students and professionals"
  },
  {
    pname: "Sony WH-1000XM5",
    catname: "Headphone",
    price: 29999,
    descr: "Wireless noise-cancelling headphones"
  },
  {
    pname: "Boat Rockerz 450",
    catname: "Headphone",
    price: 1499,
    descr: "Budget wireless Bluetooth headphones"
  }
];

function printProduct(product){
    let str=''
    product.forEach((index,i) => {

        //console.log(index);
        
            str+=`
                 <tr>
                            <td>${i+1}</td>
                            <td>${index.pname}</td>
                            <td>${index.catname}</td>
                            <td>${index.price}</td>
                            <td>${index.descr}</td>
                           
                        </tr>
            `
    });
    document.getElementById('tdata').innerHTML=str;
}


window.onload=printProduct(products);

function filtertByCat(catname){
    let filterArray;
       if(catname=='all'){
            filterArray=products;
       }
       else{
        filterArray = products.filter((index,i)=>{
           if(index.catname==catname){
               return index
           }
      })
       }
      printProduct(filterArray)
      
}

    </script>
</body>
</html>
