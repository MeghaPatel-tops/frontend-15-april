        //function returing value
        function square(num){
            return num*num;
        }

        console.log(square(12));

        //function called itsself
        function factFind(num){//5//4//3//2//1
            if(num == 1){
                 return 1;
            }
            let f= num * factFind(num-1)
            return f;
        }

        console.log(factFind(5));
