<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <h1 align="center">Rowspan colspan</h1>
    <table align="center" border="1" cellpadding="15px" width="60%">
        <tr>
            <td colspan="2">cell1</td>
            <td>cell2</td>
            <td>cell3</td>
        </tr>
        <tr>
            <td rowspan="3">col4</td>
            <td>col5</td>
            <td>col6</td>
            <td>col7</td>
        </tr>
        <tr>
            
            <td colspan="3">col8</td>
          
        </tr>
        <tr>
            
            <td>col9</td>
            <td colspan="2">col10</td>
            
        </tr>
    </table>
</body>
</html>
