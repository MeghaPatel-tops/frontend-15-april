<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            height: 600px;
            justify-content: center;
            align-items: center;
        }
        .box{
            background-color: black;
            color:white;
            font-size: 2em;
            padding: 100px 200px;
        }
    </style>
</head>
<body>
    <div class="box" id="box"></div>
    <script>
        let date = new Date();
        console.log(date);
        let newDate = `${date.getFullYear()}-${date.getMonth()+1}-${date.getDate()} ${date.getHours()}:${date.getMinutes()}:${date.getSeconds()}`;
        console.log(newDate);

        function printDate(){
             let date = new Date();
            let newDate = `${date.getFullYear()}-${date.getMonth()+1}-${date.getDate()} ${date.getHours()}:${date.getMinutes()}:${date.getSeconds()}`;
            document.getElementById('box').textContent=newDate;
        }

       setInterval(printDate,1000);
        
    </script>
</body>
</html>
