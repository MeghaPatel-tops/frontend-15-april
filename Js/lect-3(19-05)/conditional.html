<body>
    
    <fieldset>
        <label for="">Age</label>
        <input type="text" name="" id="age">
        <input type="button" value="Submit" onclick="CheckAge()">

      <script>

               let age = +document.getElementById('age').value;

               }
               else{
                alert('not Eligible')
               }
           }
      </script>
